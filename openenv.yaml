name: anti-jamming-env
display_name: "Anti-Jamming Communication System"
version: "1.0.0"
description: |
  Realistic wireless communication environment where agents learn to maintain
  reliable links under intelligent jamming attacks. Includes path loss,
  fading, interference modeling, and adaptive jammers.
license: "MIT"
author:
  name: "Bhargav-2007"
  github: "https://github.com/Bhargav-2007"
repository:
  github: "https://github.com/Bhargav-2007/openenv-anti-jamming"
tags:
  - wireless-communications
  - anti-jamming
  - cognitive-radio
  - spectrum-sensing
  - real-world

environment:
  entry_point: "server.py"
  action_space: "anti_jamming_env.models.AntiJammingAction"
  observation_space: "anti_jamming_env.models.AntiJammingObservation"
  state_space: "anti_jamming_env.models.AntiJammingState"

tasks:
  - name: "easy"
    description: "Defend against basic spot jamming with frequency hopping"
    difficulty: "easy"
    max_steps: 50
    success_threshold: 0.70

  - name: "medium"
    description: "Handle barrage and sweep jamming with adaptive strategies"
    difficulty: "medium"
    max_steps: 50
    success_threshold: 0.60

  - name: "hard"
    description: "Survive intelligent learning jammer with randomized policies"
    difficulty: "hard"
    max_steps: 50
    success_threshold: 0.50

runtime:
  python_version: "3.11"
  docker_image: "bhargav-2007/anti-jamming-env:latest"
  cpu_cores: 2
  memory_gb: 8
  gpu_required: false

baseline:
  script: "inference.py"
  model: "Qwen/Qwen2.5-72B-Instruct"
  scores:
    easy: 0.70
    medium: 0.60
    hard: 0.50